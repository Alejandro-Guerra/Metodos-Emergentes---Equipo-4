<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Diario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="diario.css">
</head>

<body>

  <header class="topbar">
    <div class="avatar" id="avatarPerfil">A</div>

    <div class="greeting">
      <h1>Hola</h1>
      <p>¿Cómo te sientes hoy?</p>
    </div>
  </header>

  <nav class="nav">
    <div class="wrap">
      <a href="../Mishabitos/Index.html">Mis Hábitos</a>
      <a href="../Mismascotas/Index.html">Mis Mascotas</a>
      <a class="active" href="../diario/diario.html">Diario</a>
      <a href="../Configuracion/Index.html">Configuración</a>
    </div>
  </nav>

  <section class="section">
    <div class="wrap">
      <div>
        <h2>Mi Diario</h2>
        <p class="sub">Habla sobre cómo te sientes y guarda tus conversaciones</p>
      </div>

      <button class="btn btn-primary" id="btnAbrirModal" type="button">
        + Iniciar charla
      </button>
    </div>
  </section>

  <main class="main">
    <div class="panel">

      <section class="empty" id="emptyState">
        <div class="plus">💬</div>
        <h3>No hay conversaciones aún</h3>
        <p>Empieza iniciando una charla sobre cómo te sientes hoy</p>

        <button class="btn btn-primary" id="btnPrimeraEntrada" type="button">
          Iniciar charla
        </button>
      </section>

      <section class="list" id="listSection">
        <p class="count" id="entradasCount">0 conversaciones guardadas</p>
        <div class="cards" id="cards"></div>
      </section>

    </div>
  </main>

  <!-- MODAL -->
  <div class="backdrop" id="backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tituloModal">

      <div class="modal-head">
        <h3 id="tituloModal">Iniciar charla</h3>
        <button class="icon-btn" id="btnCerrarModal" type="button" aria-label="Cerrar">✕</button>
      </div>

      <div class="field">
        <label for="mensajeUsuario">¿Cómo estás hoy?</label>
        <textarea
          id="mensajeUsuario"
          placeholder="Escribe cómo te sientes hoy..."
        ></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="btnCancelar" type="button">
          Cancelar
        </button>

        <button class="btn btn-primary btn-full" id="btnGuardar" type="button">
          Guardar charla
        </button>
      </div>

    </div>
  </div>

  <script src="diario.js"></script>
</body>
</html>
